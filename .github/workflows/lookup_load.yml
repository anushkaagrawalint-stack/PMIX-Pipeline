name: lookup-load

on:
  push:
    branches: [main]
    paths:
      - "Data/LookupData/**.xlsx"
  workflow_dispatch: {}

jobs:
  load:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Load lookup tables
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python -m toast_pipeline.cli load-lookups
