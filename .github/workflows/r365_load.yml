name: r365-load

on:
  push:
    branches: [main]
    paths:
      - "Data/R365Data/ModifierCost/**.xlsx"
      - "Data/R365Data/ItemCost/**.xlsx"
  workflow_dispatch: {}

jobs:
  load:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Load R365 data
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -m toast_pipeline.cli r365-modifier-cost
          python -m toast_pipeline.cli r365-item-cost
